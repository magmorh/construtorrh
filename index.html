<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ConstrutorRH</title>
    <script>
      window.onerror = function(msg, src, line, col, err) {
        document.getElementById('root').innerHTML =
          '<div style="padding:40px;font-family:monospace;background:#fff;color:#dc2626;border:2px solid #dc2626;margin:20px;border-radius:8px">' +
          '<h2>❌ Erro JavaScript</h2>' +
          '<b>' + msg + '</b><br/>' +
          'Arquivo: ' + src + ' | Linha: ' + line + '<br/>' +
          (err ? '<pre>' + (err.stack||err) + '</pre>' : '') +
          '</div>';
      };
      window.addEventListener('unhandledrejection', function(e) {
        document.getElementById('root').innerHTML +=
          '<div style="padding:20px;font-family:monospace;background:#fff;color:#b45309;border:2px solid #b45309;margin:20px;border-radius:8px">' +
          '<h2>⚠️ Promise Rejeitada</h2>' +
          '<pre>' + (e.reason?.stack || e.reason || e) + '</pre></div>';
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
